<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ポモドーロ時計ウィジェット</title>
<style>
  :root{
    --bg: #ffffff;
    --face: #ffffff;
    --ink: #1c1c1c;
    --sub: #9aa0a6;
    --tick: #c8ccd0;
    --tick-strong: #5f6368;
    --red: #ff3b30;
    --red-soft: rgba(255,59,48,0.14);
    --accent: #1c1c1c;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; height:100%; }
  body{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px; min-height:100vh; background:var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
    color:var(--ink); user-select:none;
  }
  .wrap{ display:flex; flex-direction:column; align-items:center; gap:12px; padding:16px; }
  .clock{ width:min(70vw,260px); height:min(70vw,260px); position:relative; }
  svg{ width:100%; height:100%; display:block; overflow:visible; }
  .digital{
    font-variant-numeric:tabular-nums; font-feature-settings:"tnum";
    font-size:13px; letter-spacing:0.04em; color:var(--sub);
    display:flex; flex-direction:column; align-items:center; gap:2px; line-height:1.3;
  }
  .digital .now{ font-size:14px; color:var(--ink); font-weight:600; }
  .digital .remain{ font-size:12px; color:var(--red); font-weight:600; min-height:15px; }
  .controls{ display:flex; gap:8px; align-items:center; }
  button{
    font:inherit; font-size:13px; font-weight:600; cursor:pointer;
    border:none; border-radius:999px; padding:8px 18px;
    background:var(--accent); color:#fff; transition:transform .08s ease, opacity .2s ease;
  }
  button:active{ transform:scale(0.96); }
  button.ghost{ background:transparent; color:var(--sub); border:1px solid var(--tick); }
  button:disabled{ opacity:0.4; cursor:default; }
  .status{ font-size:12px; color:var(--sub); min-height:16px; font-weight:600; }
  .status.done{ color:var(--red); }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#191919; --face:#202020; --ink:#e8e8e8; --sub:#8a8f94; --tick:#3a3a3a; --tick-strong:#b0b0b0; --accent:#e8e8e8; }
    button{ color:#191919; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="clock">
      <svg viewBox="0 0 200 200" aria-label="ポモドーロ時計">
        <circle cx="100" cy="100" r="95" fill="var(--face)" stroke="var(--tick)" stroke-width="1"/>
        <path id="arc" fill="none" stroke="var(--red)" stroke-width="7" stroke-linecap="round" opacity="0"/>
        <g id="ticks"></g>
        <line id="hourHand"   x1="100" y1="100" x2="100" y2="55"  stroke="var(--ink)" stroke-width="4.5" stroke-linecap="round"/>
        <line id="minuteHand" x1="100" y1="100" x2="100" y2="30"  stroke="var(--ink)" stroke-width="3"   stroke-linecap="round"/>
        <line id="secondHand" x1="100" y1="110" x2="100" y2="22"  stroke="var(--red)" stroke-width="1.4" stroke-linecap="round"/>
        <circle cx="100" cy="100" r="3.5" fill="var(--ink)"/>
      </svg>
    </div>
    <div class="digital">
      <div class="now" id="nowText">--:--:--</div>
      <div class="remain" id="remainText"></div>
    </div>
    <div class="status" id="status">25分ポモドーロ</div>
    <div class="controls">
      <button id="startBtn">スタート</button>
      <button id="resetBtn" class="ghost" disabled>リセット</button>
    </div>
  </div>
<script>
(function(){
  const FOCUS_MIN = 25;
  const FOCUS_MS  = FOCUS_MIN*60*1000;
  const R = 88;
  const CX = 100, CY = 100;
  let endTime = null;
  const $ = id => document.getElementById(id);
  const arc = $("arc");
  const startBtn = $("startBtn");
  const resetBtn = $("resetBtn");
  const statusEl = $("status");
  const nowText = $("nowText");
  const remainText = $("remainText");
  const ticks = $("ticks");
  for(let i=0;i<60;i++){
    const ang = (i*6) * Math.PI/180;
    const isHour = i%5===0;
    const r1 = isHour ? 79 : 84;
    const r2 = 90;
    const x1 = CX + r1*Math.sin(ang), y1 = CY - r1*Math.cos(ang);
    const x2 = CX + r2*Math.sin(ang), y2 = CY - r2*Math.cos(ang);
    const ln = document.createElementNS("http://www.w3.org/2000/svg","line");
    ln.setAttribute("x1",x1); ln.setAttribute("y1",y1);
    ln.setAttribute("x2",x2); ln.setAttribute("y2",y2);
    ln.setAttribute("stroke", isHour ? "var(--tick-strong)" : "var(--tick)");
    ln.setAttribute("stroke-width", isHour ? 2 : 1);
    ln.setAttribute("stroke-linecap","round");
    ticks.appendChild(ln);
  }
  function pt(angleDeg, r){
    const a = (angleDeg-90) * Math.PI/180;
    return [CX + r*Math.cos(a), CY + r*Math.sin(a)];
  }
  function arcPath(startDeg, endDeg, r){
    let sweep = endDeg - startDeg;
    if(sweep < 0) sweep += 360;
    const largeArc = sweep > 180 ? 1 : 0;
    const [x1,y1] = pt(startDeg, r);
    const [x2,y2] = pt(endDeg, r);
    return `M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2}`;
  }
  function pad(n){ return String(n).padStart(2,"0"); }
  function setHands(now){
    const ms = now.getMilliseconds();
    const s = now.getSeconds() + ms/1000;
    const m = now.getMinutes() + s/60;
    const h = (now.getHours()%12) + m/60;
    rotate("secondHand", s*6);
    rotate("minuteHand", m*6);
    rotate("hourHand",   h*30);
    nowText.textContent = pad(now.getHours())+":"+pad(now.getMinutes())+":"+pad(now.getSeconds());
  }
  function rotate(id, deg){
    $(id).setAttribute("transform", `rotate(${deg} ${CX} ${CY})`);
  }
  function tick(){
    const now = new Date();
    setHands(now);
    if(endTime){
      const remainMs = endTime - now.getTime();
      if(remainMs <= 0){
        finish();
      } else {
        const nowMinFloat = now.getMinutes() + now.getSeconds()/60 + now.getMilliseconds()/60000;
        const endMinFloat = nowMinFloat + remainMs/60000;
        const startDeg = (nowMinFloat % 60) * 6;
        const endDeg   = (endMinFloat % 60) * 6;
        arc.setAttribute("d", arcPath(startDeg, endDeg, R));
        arc.setAttribute("opacity", 1);
        const rs = Math.floor(remainMs/1000);
        remainText.textContent = "残り " + pad(Math.floor(rs/60)) + ":" + pad(rs%60);
      }
    }
    requestAnimationFrame(tick);
  }
  function start(){
    endTime = Date.now() + FOCUS_MS;
    startBtn.textContent = "集中中…";
    startBtn.disabled = true;
    resetBtn.disabled = false;
    statusEl.textContent = "🍅 ポモドーロ進行中";
    statusEl.classList.remove("done");
  }
  function reset(){
    endTime = null;
    arc.setAttribute("opacity", 0);
    remainText.textContent = "";
    startBtn.textContent = "スタート";
    startBtn.disabled = false;
    resetBtn.disabled = true;
    statusEl.textContent = FOCUS_MIN + "分ポモドーロ";
    statusEl.classList.remove("done");
  }
  function finish(){
    endTime = null;
    arc.setAttribute("opacity", 0);
    remainText.textContent = "";
    startBtn.textContent = "もう一回";
    startBtn.disabled = false;
    resetBtn.disabled = true;
    statusEl.textContent = "🎉 ポモドーロ完了！おつかれさま";
    statusEl.classList.add("done");
    flash();
  }
  function flash(){
    let n=0;
    const id = setInterval(()=>{
      document.body.style.background = (n%2===0) ? "var(--red-soft)" : "var(--bg)";
      if(++n>=6){ clearInterval(id); document.body.style.background="var(--bg)"; }
    },250);
  }
  startBtn.addEventListener("click", ()=>{ if(endTime) return; start(); });
  resetBtn.addEventListener("click", reset);
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
