<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ポモドーロ時計（コンパクト版）</title>
<style>
  :root{
    --bg:#ffffff; --face:#ffffff; --ink:#1c1c1c; --sub:#9aa0a6;
    --tick:#c8ccd0; --tick-strong:#5f6368;
    --red:#ff3b30; --red-soft:rgba(255,59,48,0.14);
    --accent:#1c1c1c; --chip:#f1f3f4; --chip-on:#1c1c1c;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; height:100%; }
  body{
    display:flex; align-items:center; justify-content:center; min-height:100vh;
    background:var(--bg); color:var(--ink); user-select:none;
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
  }
  .widget{ width:min(82vw,240px); display:flex; flex-direction:column; gap:6px; padding:8px; }
  .topbar{ display:flex; align-items:center; gap:6px; height:24px; }
  .icon-btn{
    width:24px; height:24px; border:none; border-radius:50%; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    background:var(--accent); color:#fff; font-size:11px; padding:0;
    transition:transform .08s ease, opacity .2s ease;
  }
  .icon-btn.ghost{ background:var(--chip); color:var(--sub); }
  .icon-btn:active{ transform:scale(0.92); }
  .icon-btn:disabled{ opacity:0.4; cursor:default; }
  .count{ margin-left:auto; font-size:11px; color:var(--sub); font-weight:600; }
  .clock{ position:relative; width:100%; aspect-ratio:1/1; }
  svg{ width:100%; height:100%; display:block; overflow:visible; }
  .dateText{ fill:var(--sub); font-size:11px; font-weight:600; }
  .timeText{ fill:var(--ink); font-size:19px; font-weight:700; font-variant-numeric:tabular-nums; }
  .remainText{ fill:var(--red); font-size:11px; font-weight:700; font-variant-numeric:tabular-nums; }
  .pill{ fill:var(--bg); opacity:0.72; }
  .chips{ display:flex; gap:5px; justify-content:center; }
  .chip{
    flex:1; border:none; border-radius:8px; cursor:pointer; padding:5px 0;
    background:var(--chip); color:var(--sub); font-size:11px; font-weight:700;
    transition:transform .08s ease;
  }
  .chip.on{ background:var(--chip-on); color:#fff; }
  .chip:active{ transform:scale(0.95); }
  .chip:disabled{ opacity:0.4; cursor:default; }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#191919; --face:#202020; --ink:#e8e8e8; --sub:#8a8f94; --tick:#3a3a3a; --tick-strong:#b0b0b0; --accent:#e8e8e8; --chip:#2a2a2a; --chip-on:#e8e8e8; }
    .icon-btn{ color:#191919; } .chip.on{ color:#191919; }
  }
</style>
</head>
<body>
  <div class="widget">
    <div class="topbar">
      <button class="icon-btn" id="startBtn" title="スタート">▶</button>
      <button class="icon-btn ghost" id="resetBtn" title="リセット" disabled>↺</button>
      <span class="count" id="count">🍅 × 0</span>
    </div>
    <div class="clock">
      <svg viewBox="0 0 200 200" aria-label="ポモドーロ時計">
        <circle cx="100" cy="100" r="95" fill="var(--face)" stroke="var(--tick)" stroke-width="1"/>
        <path id="arc" fill="none" stroke="var(--red)" stroke-width="6" stroke-linecap="round" opacity="0"/>
        <g id="ticks"></g>
        <text id="dateText" class="dateText" x="100" y="66" text-anchor="middle">--/--</text>
        <rect class="pill" x="58" y="120" width="84" height="22" rx="6"/>
        <text id="timeText" class="timeText" x="100" y="136" text-anchor="middle">--:--:--</text>
        <text id="remainText" class="remainText" x="100" y="154" text-anchor="middle"></text>
        <line id="hourHand"   x1="100" y1="100" x2="100" y2="58" stroke="var(--ink)" stroke-width="4.5" stroke-linecap="round"/>
        <line id="minuteHand" x1="100" y1="100" x2="100" y2="34" stroke="var(--ink)" stroke-width="3"   stroke-linecap="round"/>
        <line id="secondHand" x1="100" y1="108" x2="100" y2="26" stroke="var(--red)" stroke-width="1.3" stroke-linecap="round"/>
        <circle cx="100" cy="100" r="3" fill="var(--ink)"/>
      </svg>
    </div>
    <div class="chips" id="chips">
      <button class="chip" data-min="5">5</button>
      <button class="chip" data-min="15">15</button>
      <button class="chip on" data-min="25">25</button>
      <button class="chip" data-min="50">50</button>
    </div>
  </div>
<script>
(function(){
  const R = 88, CX = 100, CY = 100;
  const WDAY = ["日","月","火","水","木","金","土"];
  let focusMin = 25;
  let state = "idle";
  let endTime = null;
  let pausedRemain = null;
  let doneCount = 0;
  const $ = id => document.getElementById(id);
  const arc=$("arc"), startBtn=$("startBtn"), resetBtn=$("resetBtn");
  const dateText=$("dateText"), timeText=$("timeText"), remainText=$("remainText");
  const countEl=$("count"), chips=$("chips");
  const ticks=$("ticks");
  for(let i=0;i<60;i++){
    const ang=(i*6)*Math.PI/180, isHour=i%5===0;
    const r1=isHour?79:84, r2=90;
    const ln=document.createElementNS("http://www.w3.org/2000/svg","line");
    ln.setAttribute("x1",CX+r1*Math.sin(ang)); ln.setAttribute("y1",CY-r1*Math.cos(ang));
    ln.setAttribute("x2",CX+r2*Math.sin(ang)); ln.setAttribute("y2",CY-r2*Math.cos(ang));
    ln.setAttribute("stroke", isHour?"var(--tick-strong)":"var(--tick)");
    ln.setAttribute("stroke-width", isHour?2:1);
    ln.setAttribute("stroke-linecap","round");
    ticks.appendChild(ln);
  }
  function pt(deg,r){ const a=(deg-90)*Math.PI/180; return [CX+r*Math.cos(a), CY+r*Math.sin(a)]; }
  function arcPath(s,e,r){ let sw=e-s; if(sw<0)sw+=360; const la=sw>180?1:0; const[x1,y1]=pt(s,r),[x2,y2]=pt(e,r); return `M ${x1} ${y1} A ${r} ${r} 0 ${la} 1 ${x2} ${y2}`; }
  function pad(n){ return String(n).padStart(2,"0"); }
  function getRemain(now){
    if(state==="running") return endTime-now;
    if(state==="paused")  return pausedRemain;
    return null;
  }
  function tick(){
    const now=new Date();
    const s=now.getSeconds()+now.getMilliseconds()/1000;
    const m=now.getMinutes()+s/60, h=(now.getHours()%12)+m/60;
    $("secondHand").setAttribute("transform",`rotate(${s*6} ${CX} ${CY})`);
    $("minuteHand").setAttribute("transform",`rotate(${m*6} ${CX} ${CY})`);
    $("hourHand").setAttribute("transform",`rotate(${h*30} ${CX} ${CY})`);
    dateText.textContent=(now.getMonth()+1)+"/"+now.getDate()+"("+WDAY[now.getDay()]+")";
    timeText.textContent=pad(now.getHours())+":"+pad(now.getMinutes())+":"+pad(now.getSeconds());
    const remainMs=getRemain(now.getTime());
    if(remainMs!==null && remainMs>0){
      const nowMin=now.getMinutes()+now.getSeconds()/60+now.getMilliseconds()/60000;
      const endMin=nowMin+remainMs/60000;
      arc.setAttribute("d",arcPath((nowMin%60)*6,(endMin%60)*6,R));
      arc.setAttribute("opacity",1);
      const rs=Math.floor(remainMs/1000);
      remainText.textContent=(state==="paused"?"⏸ ":"残り ")+pad(Math.floor(rs/60))+":"+pad(rs%60);
    } else if(state==="running" && remainMs<=0){
      finish();
    }
    requestAnimationFrame(tick);
  }
  function setState(next){
    state=next;
    if(state==="idle"){ arc.setAttribute("opacity",0); remainText.textContent=""; startBtn.textContent="▶"; resetBtn.disabled=true; setChipsDisabled(false); }
    if(state==="running"){ startBtn.textContent="⏸"; resetBtn.disabled=false; setChipsDisabled(true); }
    if(state==="paused"){ startBtn.textContent="▶"; resetBtn.disabled=false; }
    if(state==="done"){ arc.setAttribute("opacity",0); remainText.textContent="🎉 完了！"; startBtn.textContent="▶"; resetBtn.disabled=true; setChipsDisabled(false); }
  }
  function setChipsDisabled(d){ chips.querySelectorAll(".chip").forEach(c=>c.disabled=d); }
  startBtn.addEventListener("click",()=>{
    if(state==="idle"||state==="done"){ endTime=Date.now()+focusMin*60000; setState("running"); }
    else if(state==="running"){ pausedRemain=endTime-Date.now(); endTime=null; setState("paused"); }
    else if(state==="paused"){ endTime=Date.now()+pausedRemain; pausedRemain=null; setState("running"); }
  });
  resetBtn.addEventListener("click",()=>{ endTime=null; pausedRemain=null; setState("idle"); });
  chips.addEventListener("click",e=>{
    const b=e.target.closest(".chip"); if(!b||b.disabled) return;
    focusMin=parseInt(b.dataset.min,10);
    chips.querySelectorAll(".chip").forEach(c=>c.classList.toggle("on",c===b));
  });
  function finish(){
    endTime=null; doneCount++; countEl.textContent="🍅 × "+doneCount;
    setState("done");
    let n=0; const id=setInterval(()=>{ document.body.style.background=(n%2===0)?"var(--red-soft)":"var(--bg)"; if(++n>=6){clearInterval(id);document.body.style.background="var(--bg)";} },250);
  }
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
